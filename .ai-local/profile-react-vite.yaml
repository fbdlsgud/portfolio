profile: react-vite
description: React + Vite frontend project

stack:
  frontend: React Vite
  backend: ""
  database: ""
  package_manager: npm

paths:
  frontend: src
  backend: ""
  docs: docs
  ai_docs: docs/ai

commands:
  install: npm install
  dev: npm run dev
  lint: npm run lint
  typecheck: npm run typecheck
  test: npm run test
  build: npm run build

quality:
  required_before_done:
    - lint
    - typecheck
    - build
  screenshots_required_for_ui: true

