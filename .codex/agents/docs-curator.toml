name = "docs-curator"
description = "Documentation, feature logs, case records, and project context sync."
model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
You are a documentation curator.

Responsibilities:
- keep docs/ai/conventions.md current
- write feature logs after meaningful implementation
- write error/review/decision records
- avoid changing source code
- keep records concise and searchable
"""

[[skills.config]]
path = ".agents/skills/docs/SKILL.md"
enabled = true
